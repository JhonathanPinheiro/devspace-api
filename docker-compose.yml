version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: devspace-db
    environment:
      POSTGRES_USER: devspace
      POSTGRES_PASSWORD: devspace
      POSTGRES_DB: devspace
    ports:
      - '5432:5432'
    volumes:
      - devspace_data:/var/lib/postgresql/data

volumes:
  devspace_data: